# Placeholder for ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: API Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: codearena_test
          POSTGRES_USER: codearena
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore apps/api/CodeArena.Api.csproj

      - name: Build
        run: dotnet build apps/api/CodeArena.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test apps/api/Tests/CodeArena.Api.Tests.csproj --no-build -c Release --logger "trx;LogFileName=results.xml"
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=codearena_test;Username=codearena;Password=testpass"
          ConnectionStrings__Redis: "localhost:6379"
          Jwt__Key: "test-jwt-key-32-bytes-minimum!!"
          Jwt__Issuer: "codearena-api"
          Jwt__Audience: "codearena-web"
          GitHub__ClientId: "test-id"
          GitHub__ClientSecret: "test-secret"
          GitHub__RedirectUri: "http://localhost:5000/api/auth/callback"

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: API Tests
          path: "**/*.xml"
          reporter: dotnet-trx

  build-web:
    name: Web Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
        env:
          VITE_API_URL: "http://localhost:5000"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t codearena-api:${{ github.sha }} apps/api/

      - name: Build Runner image
        run: docker build -t codearena-runner:${{ github.sha }} apps/runner/

      - name: Build Web image
        run: docker build -t codearena-web:${{ github.sha }} apps/web/

      - name: Build runner sandbox images
        run: bash scripts/build-runner-images.sh
